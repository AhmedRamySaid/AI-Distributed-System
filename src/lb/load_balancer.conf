upstream gpu_workers {
    server 45.247.96.247:8001 weight=1 max_fails=3 fail_timeout=30s;
    server 45.247.96.247:8002 weight=1 max_fails=3 fail_timeout=30s;
    server 45.247.96.247:8003 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;   # Accepts any hostname / IP

    location / {
        proxy_pass         http://gpu_workers;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts suitable for LLM inference (slow responses)
        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
    }
}